<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking Completo | SomosAventura2</title>
  <link rel="icon" type="image/png" href="/favicon.png?v=99" sizes="32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=99">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --whatsapp: #25D366;
      --green-primary: #4CAF50;
      --green-mountain: #2d5a3d;
      --green-dark: #1a3a28;
      --bg-dark: #0e2f36;
      --bg-card: #1a3d47;
      --text-primary: #ffffff;
      --text-secondary: #b8c5be;
      --accent: #76c893;
      --accent-orange: #ff8c42;
      --shadow: rgba(0, 0, 0, 0.5);
      --border: rgba(118, 200, 147, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    body.lightbox-open { overflow: hidden; }

    .container {
      max-width: 480px; /* mobile first */
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(14, 47, 54, 0.95) 0%, rgba(18, 56, 64, 0.97) 100%),
                  url('fondo2.jpg') center/cover fixed;
      min-height: 100vh;
      position: relative;
      padding: 18px 14px 60px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .topbar h1 {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-link {
      appearance: none;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      font-size: 13px;
    }

    /* ===== Ranking (mobile list) ===== */
    .ranking-section { padding: 12px 0 0; }
    .ranking-intro {
      text-align: left;
      color: var(--text-secondary);
      font-size: 13px;
      margin: 6px 0 14px;
    }

    .ranking-loading {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-secondary);
    }

    .ranking-loading::after {
      content: '⛰️';
      display: block;
      font-size: 40px;
      margin-top: 12px;
      animation: ranking-pulse 1.2s ease-in-out infinite;
    }

    @keyframes ranking-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .ranking-grid-actions {
      margin-top: 18px;
      text-align: center;
    }

    .btn-load-more {
      appearance: none;
      border: 1px solid var(--border);
      background: rgba(118, 200, 147, 0.12);
      color: var(--text-primary);
      padding: 12px 16px;
      border-radius: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-load-more:disabled { opacity: 0.55; cursor: not-allowed; }

    .ranking-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Top 3: estilo y animaciones de la landing (mobile first) */
    .ranking-podio {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
      max-width: 100%;
    }

    .ranking-podio .ranking-card {
      margin-bottom: 0;
      position: relative;
      overflow: hidden;
    }

    /* Orden visual: 2º, 1º, 3º (1º al centro visualmente) */
    .ranking-podio .ranking-card:nth-child(1) { order: 2; }
    .ranking-podio .ranking-card:nth-child(2) { order: 1; }
    .ranking-podio .ranking-card:nth-child(3) { order: 3; }

    /* Sin animaciones hasta que entre a viewport */
    .ranking-section:not(.in-view) .ranking-podio .ranking-card,
    .ranking-section:not(.in-view) .ranking-rest .ranking-card {
      opacity: 0;
      animation: none;
    }

    .ranking-section.in-view .ranking-list .ranking-card {
      animation: ranking-appear 0.4s ease-out backwards;
    }

    .ranking-section.in-view .ranking-podio .ranking-card.rank-1 {
      background: linear-gradient(145deg, rgba(255, 215, 0, 0.22), var(--bg-card));
      border-color: rgba(255, 215, 0, 0.55);
      animation: podio-entrance-1 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) backwards, podio-glow-gold 2.8s ease-in-out 0.8s infinite;
    }

    .ranking-section.in-view .ranking-podio .ranking-card.rank-1::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -80%;
      width: 28%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.45), transparent);
      transform: rotate(28deg);
      animation: podio-shine 3.2s ease-in-out 1.1s infinite;
      pointer-events: none;
    }

    .ranking-section.in-view .ranking-podio .ranking-card.rank-2 {
      background: linear-gradient(145deg, rgba(192, 192, 192, 0.18), var(--bg-card));
      border-color: rgba(192, 192, 192, 0.5);
      animation: podio-entrance-2 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) backwards, podio-glow-silver 3.2s ease-in-out 0.6s infinite;
    }

    .ranking-section.in-view .ranking-podio .ranking-card.rank-2::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -80%;
      width: 22%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transform: rotate(25deg);
      animation: podio-shine 3.2s ease-in-out 1.68s infinite;
      pointer-events: none;
    }

    .ranking-section.in-view .ranking-podio .ranking-card.rank-3 {
      background: linear-gradient(145deg, rgba(205, 127, 50, 0.2), var(--bg-card));
      border-color: rgba(205, 127, 50, 0.5);
      animation: podio-entrance-3 0.5s ease-out backwards, podio-glow-bronze 3.8s ease-in-out 0.5s infinite;
    }

    .ranking-section.in-view .ranking-podio .ranking-card.rank-3::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -80%;
      width: 18%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.22), transparent);
      transform: rotate(22deg);
      animation: podio-shine 3.2s ease-in-out 2.26s infinite;
      pointer-events: none;
    }

    @keyframes ranking-appear {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes podio-entrance-1 {
      0% {
        opacity: 0;
        transform: translateY(32px) scale(0.88);
        box-shadow: 0 0 0 rgba(255, 215, 0, 0);
      }
      50% {
        opacity: 1;
        transform: translateY(-4px) scale(1.02);
        box-shadow: 0 12px 40px rgba(255, 215, 0, 0.5), 0 0 60px rgba(255, 215, 0, 0.25);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        box-shadow: 0 6px 24px rgba(255, 215, 0, 0.35), 0 0 30px rgba(255, 215, 0, 0.12);
      }
    }

    @keyframes podio-entrance-2 {
      0% {
        opacity: 0;
        transform: translateY(20px);
        box-shadow: 0 0 0 rgba(192, 192, 192, 0);
      }
      60% {
        opacity: 1;
        box-shadow: 0 8px 28px rgba(192, 192, 192, 0.3);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
        box-shadow: 0 4px 18px rgba(192, 192, 192, 0.2);
      }
    }

    @keyframes podio-entrance-3 {
      0% {
        opacity: 0;
        transform: translateY(14px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes podio-shine {
      0% { left: -80%; }
      18% { left: 110%; }
      100% { left: 110%; }
    }

    @keyframes podio-glow-gold {
      0%, 100% { box-shadow: 0 6px 24px rgba(255, 215, 0, 0.35), 0 0 30px rgba(255, 215, 0, 0.1); }
      50% { box-shadow: 0 8px 32px rgba(255, 215, 0, 0.5), 0 0 50px rgba(255, 215, 0, 0.2); }
    }

    @keyframes podio-glow-silver {
      0%, 100% { box-shadow: 0 4px 18px rgba(192, 192, 192, 0.2); }
      50% { box-shadow: 0 6px 24px rgba(192, 192, 192, 0.35), 0 0 35px rgba(192, 192, 192, 0.08); }
    }

    @keyframes podio-glow-bronze {
      0%, 100% { box-shadow: 0 4px 16px rgba(205, 127, 50, 0.2); }
      50% { box-shadow: 0 5px 20px rgba(205, 127, 50, 0.3); }
    }

    .ranking-podio .ranking-card:nth-child(1) { animation-delay: 0.08s; }
    .ranking-podio .ranking-card:nth-child(2) { animation-delay: 0.22s; }
    .ranking-podio .ranking-card:nth-child(3) { animation-delay: 0.15s; }

    .ranking-rest .ranking-card:nth-child(1) { animation-delay: 0.25s; }
    .ranking-rest .ranking-card:nth-child(2) { animation-delay: 0.3s; }
    .ranking-rest .ranking-card:nth-child(3) { animation-delay: 0.35s; }
    .ranking-rest .ranking-card:nth-child(4) { animation-delay: 0.4s; }
    .ranking-rest .ranking-card:nth-child(5) { animation-delay: 0.45s; }
    .ranking-rest .ranking-card:nth-child(6) { animation-delay: 0.5s; }
    .ranking-rest .ranking-card:nth-child(7) { animation-delay: 0.55s; }

    /* El bloque resto */
    .ranking-rest {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Rank card base (igual que landing) */
    .ranking-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      background: #121212;
      border-radius: 14px;
      padding: 14px 18px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      cursor: pointer;
      min-width: 0;
      user-select: none;
    }

    .ranking-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .ranking-card .rank-pos {
      flex-shrink: 0;
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #e8e8e8 0%, #a0a0a0 50%, #707070 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-fill-color: transparent;
      min-width: 36px;
      text-align: center;
    }

    .ranking-card .rank-avatar-placeholder {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.4);
      border: 3px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: rgba(255, 255, 255, 0.35);
      overflow: hidden;
      -webkit-mask-image: -webkit-radial-gradient(white, black);
      mask-image: radial-gradient(white, black);
    }

    .ranking-card .rank-avatar-placeholder .rank-avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .ranking-podio .ranking-card.rank-1 .rank-avatar-placeholder {
      border-color: #FFD700;
      box-shadow: 0 0 0 1px rgba(255, 215, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .ranking-podio .ranking-card.rank-2 .rank-avatar-placeholder {
      border-color: #C0C0C0;
      box-shadow: 0 0 0 1px rgba(192, 192, 192, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .ranking-podio .ranking-card.rank-3 .rank-avatar-placeholder {
      border-color: #CD7F32;
      box-shadow: 0 0 0 1px rgba(205, 127, 50, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .ranking-podio .ranking-card.rank-1 .rank-pos {
      background: linear-gradient(135deg, #fff9e6 0%, #FFD700 30%, #FFA500 70%, #cc7700 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 32px;
    }

    .ranking-podio .ranking-card.rank-2 .rank-pos {
      background: linear-gradient(135deg, #f5f5f5 0%, #C0C0C0 40%, #909090 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 30px;
    }

    .ranking-podio .ranking-card.rank-3 .rank-pos {
      background: linear-gradient(135deg, #e8d5c4 0%, #CD7F32 40%, #8B4513 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 30px;
    }

    .ranking-card .user-details {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .ranking-card .user-details h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .ranking-card .stats-pill {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 5px 12px;
      border-radius: 8px;
      border: 1px solid;
      background: rgba(0, 0, 0, 0.35);
      width: fit-content;
    }

    .ranking-card .badge-container {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      border-radius: 10px;
      transition: filter 0.25s ease;
    }

    .ranking-card .badge-container img,
    .ranking-card .badge-container .rank-badge-fallback {
      display: block;
      height: 40px;
      width: auto;
      max-width: 52px;
      object-fit: contain;
    }

    .ranking-card .badge-container .rank-badge-fallback {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      height: auto;
    }

    /* Resto (igual que landing) */
    .ranking-rest .ranking-card {
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(32, 52, 46, 0.78);
      border: 1px solid rgba(118, 200, 147, 0.5);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }

    .ranking-rest .ranking-card:hover {
      border-color: var(--accent);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(118, 200, 147, 0.2);
    }

    .ranking-rest .ranking-card .rank-pos {
      font-size: 22px;
      min-width: 28px;
    }

    .ranking-rest .ranking-card .user-details h3 { font-size: 14px; }
    .ranking-rest .ranking-card .stats-pill { font-size: 10px; padding: 4px 10px; }

    .ranking-rest .ranking-card .badge-container img,
    .ranking-rest .ranking-card .badge-container .rank-badge-fallback {
      height: 32px;
      max-width: 44px;
    }

    /* ===== Modal detalle (igual que landing) ===== */
    .ranking-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .ranking-modal.active { display: flex; }

    .ranking-modal-content {
      background-color: var(--bg-dark);
      background-image: none;
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      position: relative;
      border-radius: 16px;
      padding: 24px 20px;
      max-width: 360px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid rgba(118, 200, 147, 0.5);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: rankingModalIn 0.3s ease-out;
    }

    .ranking-modal-content.ranking-modal-content--gold {
      border: 1px solid #FFD700;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 215, 0, 0.25);
    }

    .ranking-modal-content.ranking-modal-content--silver {
      border: 1px solid #C0C0C0;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 20px rgba(192, 192, 192, 0.25);
    }

    .ranking-modal-content.ranking-modal-content--bronze {
      border: 1px solid #CD7F32;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 20px rgba(205, 127, 50, 0.25);
    }

    .ranking-modal-content.ranking-modal-content--green {
      border: 1px solid rgba(118, 200, 147, 0.5);
    }

    @keyframes rankingModalIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .ranking-modal-avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    .ranking-modal-avatar {
      flex-shrink: 0;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(118, 200, 147, 0.5);
      background: rgba(0, 0, 0, 0.3);
      -webkit-mask-image: -webkit-radial-gradient(white, black);
      mask-image: radial-gradient(white, black);
    }

    .ranking-modal-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .ranking-modal-avatar .avatar-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      font-size: 2.5rem;
      color: rgba(255,255,255,0.9);
    }

    .ranking-modal-badge-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 16px 0;
    }

    .ranking-modal-content .badge-container {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      border-radius: 12px;
    }

    .ranking-modal-content .badge-container img,
    .ranking-modal-content .badge-container .rank-badge-fallback {
      display: block;
      height: 96px;
      width: auto;
      max-width: 120px;
      object-fit: contain;
    }

    .ranking-modal-content .badge-container .rank-badge-fallback {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      height: auto;
    }

    .ranking-modal-rank-pos {
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      margin: 0 0 6px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .ranking-modal-title {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      margin: 0 0 8px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .ranking-modal-stats-pill {
      display: block;
      width: fit-content;
      margin: 0 auto 0;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 5px 12px;
      border-radius: 8px;
      border: 1px solid;
      background: rgba(0, 0, 0, 0.35);
    }

    .ranking-modal-rutas { margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(118, 200, 147, 0.2); }
    .ranking-modal-rutas-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: #ffffff; }
    .ranking-modal-rutas-list { display: flex; flex-wrap: wrap; gap: 8px; }

    .ranking-modal-ruta-tag {
      background: rgba(26, 58, 40, 0.6);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      border: 1px solid rgba(118, 200, 147, 0.2);
      color: rgba(255, 255, 255, 0.9);
    }

    .ranking-modal-ruta-tag .ruta-veces {
      background: var(--accent);
      color: #121212;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      margin-left: 4px;
    }

    .ranking-modal-proximo {
      margin-top: 16px;
      padding: 16px;
      background: rgba(26, 58, 40, 0.5);
      border-radius: 12px;
      border: 1px solid rgba(118, 200, 147, 0.2);
    }

    .ranking-modal-proximo-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .ranking-modal-proximo-text { font-size: 12px; color: rgba(255, 255, 255, 0.65); margin-bottom: 8px; }

    .ranking-modal-proximo-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      margin-bottom: 4px;
      overflow: hidden;
    }

    .ranking-modal-proximo-fill { height: 100%; border-radius: 4px; }

    .ranking-modal-proximo-meta { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255, 255, 255, 0.5); }

    .ranking-modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 24px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.2s;
    }

    .ranking-modal-close:hover { background: rgba(255, 255, 255, 0.2); }

    .ranking-modal-share {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 100001;

<body>
  <div class="container">

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const SUPABASE_URL = 'https://dgubxitmqegounjyeciw.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_EY4EoqiHn7om0Qf-HYpJZQ_HwDJXlan';

      const loading = document.getElementById('rankingLoading');
      const list = document.getElementById('rankingList');
      const podioEl = document.getElementById('rankingPodio');
      const restEl = document.getElementById('rankingRest');
      const btnLoadMore = document.getElementById('btnLoadMore');
      const rankingContainer = document.getElementById('rankingContainer');
      const rankingModalContent = document.getElementById('rankingModalContent');
      const btnCompartir = document.getElementById('btnCompartirRanking');
      const storyExport = document.getElementById('storyExport');

      if (!loading || !list || !podioEl || !restEl || !btnLoadMore || !rankingContainer) return;

      if (typeof supabase === 'undefined') {
        await new Promise(resolve => setTimeout(resolve, 250));
      }
      if (typeof supabase === 'undefined') {
        loading.textContent = 'Supabase no está disponible.';
        return;
      }

      let db = null;
      try {
        db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      } catch (e) {
        console.error(e);
        loading.textContent = 'Error inicializando Supabase.';
        return;
      }

      function calcularRangoAventurado(rutasAsistidas) {
        if (rutasAsistidas < 2) return { nombre: 'Novato', emoji: '🌱', color: '#22c55e', minRutas: 0 };
        if (rutasAsistidas <= 4) return { nombre: 'Bronce', emoji: '🥉', color: '#CD7F32', minRutas: 2 };
        if (rutasAsistidas <= 9) return { nombre: 'Plata', emoji: '🥈', color: '#C0C0C0', minRutas: 5 };
        if (rutasAsistidas <= 14) return { nombre: 'Oro', emoji: '🥇', color: '#FFD700', minRutas: 10 };
        if (rutasAsistidas <= 19) return { nombre: 'Platino', emoji: '💎', color: '#E5E4E2', minRutas: 15 };
        return { nombre: 'Diamante', emoji: '✨', color: '#b9f2ff', minRutas: 20 };
      }

      function getSiguienteRangoLanding(rango) {
        if (!rango) return null;
        if (rango.nombre === 'Novato') return calcularRangoAventurado(2);
        if (rango.nombre === 'Bronce') return calcularRangoAventurado(5);
        if (rango.nombre === 'Plata') return calcularRangoAventurado(10);
        if (rango.nombre === 'Oro') return calcularRangoAventurado(15);
        if (rango.nombre === 'Platino') return calcularRangoAventurado(20);
        return null;
      }

      function escapeHtmlLanding(s) {
        if (s == null) return '';
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function escapeHtml(s) {
        if (s == null) return '';
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function escapeAttr(s) {
        if (s == null) return '';
        const str = String(s);
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function renderCard(entry, position, avatarMap) {
        const r = entry.rango;
        const badgeSrc = 'badges/' + (r.nombre || '').toLowerCase() + '.png';
        const nombreAttr = escapeAttr(entry.nombre);
        const rutasText = entry.rutasAsistidas === 1 ? '1 RUTA' : entry.rutasAsistidas + ' RUTAS';
        const statsPillText = (r.nombre || '').toUpperCase() + ' | ' + rutasText;
        const glowColor = r.color || 'rgba(118, 200, 147, 0.5)';
        const badgeGlowStyle = 'box-shadow: 0 0 20px ' + glowColor + '44, 0 0 40px ' + glowColor + '22;';
        const avatarUrl = avatarMap && avatarMap.get(entry.nombre);

        const avatarHtml = (position <= 3)
            ? (avatarUrl
            ? '<div class="rank-avatar-placeholder"><img src="' + escapeAttr(avatarUrl) + '" alt="" class="rank-avatar-img" onerror="this.onerror=null;this.parentNode.innerHTML=\'👤\';this.parentNode.setAttribute(\'aria-hidden\',\'true\');"></div>'
            : '<div class="rank-avatar-placeholder" aria-hidden="true">👤</div>')
          : '';

        const pillStyle = 'color:' + (r.color || '#b8c5be') + ';border-color:' + (r.color || 'rgba(118,200,147,0.5)') + ';';

        return `
          <div class="ranking-card rank-${position}" role="listitem" data-nombre="${nombreAttr}">
            <div class="rank-pos">${position}</div>
            ${avatarHtml}
            <div class="user-details">
              <h3>${escapeHtml(entry.nombre)}</h3>
              <span class="stats-pill" style="${pillStyle}">${escapeHtml(statsPillText)}</span>
            </div>
            <div class="badge-container" style="${badgeGlowStyle}">
              <img src="${badgeSrc}" alt="${escapeHtml(r.nombre)}" onerror="this.onerror=null;this.style.display='none';var s=this.nextElementSibling;if(s)s.style.display='inline';">
              <span class="rank-badge-fallback" style="display:none;color:${r.color || '#b8c5be'}">${escapeHtml(r.nombre)}</span>
            </div>
          </div>`;
      }

      // Fondos aleatorios para el modal (archivos en /Fotos del proyecto)
      const MODAL_FOTOS = [
        'Fotos/1.jpeg',
        'Fotos/2.jpeg',
        'Fotos/3.jpeg',
        'Fotos/4.jpeg',
        'Fotos/5.jpeg',
        'Fotos/6.jpeg'
      ];

      function setRandomModalBackground(contentEl) {
        if (!contentEl || !MODAL_FOTOS || MODAL_FOTOS.length === 0) return;
        const url = MODAL_FOTOS[Math.floor(Math.random() * MODAL_FOTOS.length)];
        // Gradiente encima para asegurar contraste del texto.
        contentEl.style.backgroundImage =
          "linear-gradient(180deg, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.88) 100%), url('" + url + "')";
        // Guardar para el export del story (misma foto).
        window._modalRandomBgUrl = url;
      }

      function renderStoryTemplate(entry, position, backgroundUrl) {
        if (!storyExport) return;

        const r = entry.rango || {};
        const badgeSrc = 'badges/' + (r.nombre || '').toLowerCase() + '.png';
        const nombre = entry.nombre || '';

        // Aplicar el fondo aleatorio al story.
        storyExport.style.backgroundImage =
          "linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.88) 100%), url('" + (backgroundUrl || '') + "')";

        document.getElementById('storyRankPos').textContent = '#' + position;
        document.getElementById('storyNombre').textContent = nombre;

        const rutasText = entry.rutasAsistidas === 1 ? '1 RUTA' : entry.rutasAsistidas + ' RUTAS';
        const statsPillText = (r.nombre || '').toUpperCase() + ' | ' + rutasText;
        document.getElementById('storyStatsPill').textContent = statsPillText;

        const badgeRow = document.getElementById('storyBadgeRow');
        badgeRow.innerHTML = '';
        var imgBadge = document.createElement('img');
        imgBadge.src = badgeSrc;
        imgBadge.alt = r.nombre || '';
        badgeRow.appendChild(imgBadge);

        // Tags rutas
        const tagsEl = document.getElementById('storyTags');
        tagsEl.innerHTML = '';
        const rutasList = entry.rutasAsistidasList || [];
        const slice = rutasList.slice(0, 14);
        for (var i = 0; i < slice.length; i++) {
          const ru = slice[i];
          const veces = ru.vecesAsistio || 1;
          const text = escapeHtmlLanding(ru.nombre) + (veces > 1 ? ' x' + veces : '');
          var tag = document.createElement('div');
          tag.className = 'story-tag';
          tag.textContent = text;
          tagsEl.appendChild(tag);
        }
        if (rutasList.length > slice.length) {
          var tagMore = document.createElement('div');
          tagMore.className = 'story-tag';
          tagMore.style.borderStyle = 'dashed';
          tagMore.textContent = '+' + (rutasList.length - slice.length) + ' más';
          tagsEl.appendChild(tagMore);
        }

        // Próximo rango (si existe)
        const nextEl = document.getElementById('storyNext');
        const sig = entry.siguienteRango;
        if (!sig) {
          nextEl.style.display = 'none';
          return;
        }
        nextEl.style.display = 'block';

        const faltan = (sig.minRutas || 0) - (entry.rutasAsistidas || 0);
        const totalPara = entry.totalParaSiguiente || 1;
        const progreso = entry.progreso || 0;
        const pct = totalPara > 0 ? Math.min(100, (progreso / totalPara) * 100) : 0;

        document.getElementById('storyNextTitle').textContent = (sig.emoji || '') + ' Próximo rango: ' + (sig.nombre || '');
        document.getElementById('storyNextText').textContent = 'Necesitas ' + faltan + ' ruta' + (faltan !== 1 ? 's' : '') + ' más';
        document.getElementById('storyNextProgressFill').style.width = pct + '%';
        document.getElementById('storyNextProgressFill').style.background = sig.color || 'var(--accent)';
        document.getElementById('storyNextMetaLeft').textContent = progreso + '/' + totalPara;
        document.getElementById('storyNextMetaRight').textContent = Math.round(pct) + '%';
      }

      async function exportStoryAndShare() {
        try {
          const entry = window._rankingModalEntry;
          const position = window._rankingModalPosition;
          const bg = window._modalRandomBgUrl;
          if (!entry || !position) return;
          // Offline: html2canvas (CDN) no se carga. En ese caso usamos fallback con canvas nativo.
          if (typeof html2canvas === 'undefined') {
            await exportStoryCanvasFallback(entry, position, bg);
            return;
          }

          try {
            renderStoryTemplate(entry, position, bg);

            // Esperar un frame para asegurar layout estable.
            await new Promise(resolve => requestAnimationFrame(() => resolve()));

            const canvas = await html2canvas(storyExport, {
              backgroundColor: null,
              scale: 1,
              useCORS: true
            });

            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            if (!blob) {
              throw new Error('No se pudo convertir a blob');
            }

            const safeNombre = String(entry.nombre || 'ranking').replace(/[^a-zA-Z0-9_-]+/g, '-').slice(0, 40);
            const file = new File([blob], 'ranking-historia-' + safeNombre + '.png', { type: 'image/png' });

            // Descarga como fallback (seguro para Instagram).
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = file.name;
            document.body.appendChild(a);
            a.click();
            a.remove();

            // Compartir si está soportado.
            if (navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
              try {
                await navigator.share({
                  files: [file],
                  title: 'Ranking SomosAventura2',
                  text: 'Mira mi progreso en el ranking de SomosAventura2.'
                });
              } catch (e) {
                // Si el share falla, ya existe descarga.
              }
            }
          } catch (html2canvasErr) {
            console.warn('Fallo html2canvas, usando fallback canvas:', html2canvasErr);
            await exportStoryCanvasFallback(entry, position, bg);
          }
        } catch (e) {
          console.error(e);
          alert('Error exportando la historia.');
        }
      }

      // ===== Fallback offline: generar imagen historia con canvas nativo =====
      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
        });
      }

      function drawRoundRect(ctx, x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + w, y, x + w, y + h, radius);
        ctx.arcTo(x + w, y + h, x, y + h, radius);
        ctx.arcTo(x, y + h, x, y, radius);
        ctx.arcTo(x, y, x + w, y, radius);
        ctx.closePath();
      }

      function drawImageCover(ctx, img, targetW, targetH) {
        const iw = img.naturalWidth || img.width;
        const ih = img.naturalHeight || img.height;
        if (!iw || !ih) return;
        const scale = Math.max(targetW / iw, targetH / ih);
        const sw = targetW / scale;
        const sh = targetH / scale;
        const sx = (iw - sw) / 2;
        const sy = (ih - sh) / 2;
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, targetW, targetH);
      }

      function safeText(s) {
        return (s == null) ? '' : String(s);
      }

      async function exportStoryCanvasFallback(entry, position, bgUrl) {
        // Mantener mismo flujo de descarga/compartir que el caso html2canvas.
        const w = 1080;
        const h = 1920;
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        if (!ctx) {
          alert('Error exportando la historia.');
          return;
        }

        // Fondo aleatorio
        let bgImg = null;
        try {
          const fallbackBg = 'fondo2.jpg';
          const src = bgUrl || fallbackBg;
          bgImg = await loadImage(src);
        } catch (e) {
          // Si falla el fondo, dejamos fondo oscuro.
          bgImg = null;
        }

        if (bgImg) {
          drawImageCover(ctx, bgImg, w, h);
        } else {
          ctx.fillStyle = '#0e2f36';
          ctx.fillRect(0, 0, w, h);
        }

        // Overlay para que se lean los textos
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, 'rgba(0,0,0,0.55)');
        grad.addColorStop(1, 'rgba(0,0,0,0.88)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);

        const r = entry.rango || {};
        const badgeSrc = 'badges/' + (r.nombre || '').toLowerCase() + '.png';
        let badgeImg = null;
        try {
          badgeImg = await loadImage(badgeSrc);
        } catch (e) {
          badgeImg = null;
        }

        // ===== Layout =====
        // Posiciones (mobile-first estilo story)
        const padX = 70;
        let y = 150;

        // Rank
        ctx.font = '900 64px Poppins, sans-serif';
        ctx.fillStyle = '#FFFFFF';
        ctx.textBaseline = 'top';
        ctx.shadowColor = 'rgba(0,0,0,0.55)';
        ctx.shadowBlur = 10;
        ctx.fillText('#' + position, padX, y);
        y += 90;

        // Nombre
        ctx.font = '900 72px Poppins, sans-serif';
        ctx.fillStyle = '#FFFFFF';
        // Ajuste simple por longitud
        const nombre = safeText(entry.nombre);
        const maxNombreWidth = w - padX * 2;
        let fontSize = 72;
        while (ctx.measureText(nombre).width > maxNombreWidth && fontSize > 38) {
          fontSize -= 4;
          ctx.font = '900 ' + fontSize + 'px Poppins, sans-serif';
        }
        ctx.fillText(nombre, padX, y);
        y += fontSize + 34;

        // Pill stats
        const rutasText = entry.rutasAsistidas === 1 ? '1 RUTA' : entry.rutasAsistidas + ' RUTAS';
        const pillText = safeText(r.nombre).toUpperCase() + ' | ' + rutasText;
        ctx.font = '800 34px Poppins, sans-serif';
        const pillTextW = ctx.measureText(pillText).width;
        const pillH = 70;
        const pillW = pillTextW + 40;
        const pillX = padX;
        const pillY = y + 4;

        // pill background
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        drawRoundRect(ctx, pillX, pillY, pillW, pillH, 999);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.lineWidth = 3;
        ctx.stroke();

        // pill text
        ctx.fillStyle = '#e9f3ec';
        ctx.textBaseline = 'middle';
        ctx.fillText(pillText, pillX + 20, pillY + pillH / 2);
        ctx.textBaseline = 'top';

        y += 110;

        // Badge (derecha)
        const badgeBoxW = 180;
        const badgeBoxH = 180;
        const badgeX = w - padX - badgeBoxW;
        const badgeY = y - 10;
        if (badgeImg) {
          ctx.drawImage(badgeImg, badgeX, badgeY, badgeBoxW, badgeBoxH);
        } else {
          ctx.fillStyle = 'rgba(255,255,255,0.12)';
          drawRoundRect(ctx, badgeX, badgeY, badgeBoxW, badgeBoxH, 24);
          ctx.fill();
        }

        y += 210;

        // Título rutas asistidas
        ctx.font = '900 42px Poppins, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.92)';
        ctx.fillText('🏔️ Rutas asistidas', padX, y);
        y += 60;

        // Tags rutas
        const rutasList = entry.rutasAsistidasList || [];
        const slice = rutasList.slice(0, 14);
        const tagAreaW = w - padX * 2;
        const tagGap = 18;
        let tagX = padX;
        let tagY = y;
        const rowLimitY = 1360;

        ctx.font = '800 30px Poppins, sans-serif';
        for (let i = 0; i < slice.length; i++) {
          const ru = slice[i];
          const veces = ru.vecesAsistio || 1;
          const text = safeText(ru.nombre) + (veces > 1 ? ' x' + veces : '');
          const textW = ctx.measureText(text).width;
          const tagH = 64;
          const tagW = Math.min(tagAreaW, textW + 36);

          if (tagY > rowLimitY) break;
          if (tagX + tagW > padX + tagAreaW) {
            tagX = padX;
            tagY += tagH + tagGap;
          }

          // Tag pill
          ctx.fillStyle = 'rgba(26,58,40,0.55)';
          ctx.strokeStyle = 'rgba(118,200,147,0.35)';
          ctx.lineWidth = 4;
          drawRoundRect(ctx, tagX, tagY, tagW, tagH, 999);
          ctx.fill();
          ctx.setLineDash([18, 14]);
          ctx.stroke();
          ctx.setLineDash([]);

          // Text
          ctx.fillStyle = 'rgba(255,255,255,0.95)';
          ctx.textBaseline = 'middle';
          ctx.fillText(text, tagX + 18, tagY + tagH / 2);
          ctx.textBaseline = 'top';

          tagX += tagW + tagGap;
        }

        // Próximo rango (block)
        const sig = entry.siguienteRango;
        const blockX = padX;
        const blockW = w - padX * 2;
        const blockY = 1460;
        if (sig) {
          ctx.fillStyle = 'rgba(26,58,40,0.55)';
          ctx.strokeStyle = 'rgba(118,200,147,0.25)';
          ctx.lineWidth = 4;
          drawRoundRect(ctx, blockX, blockY, blockW, 380, 28);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = '#ffffff';
          ctx.font = '900 40px Poppins, sans-serif';
          ctx.fillText((sig.emoji || '') + ' Próximo rango: ' + safeText(sig.nombre), blockX + 26, blockY + 52);

          const faltan = Math.max(0, (sig.minRutas || 0) - (entry.rutasAsistidas || 0));
          ctx.fillStyle = 'rgba(255,255,255,0.75)';
          ctx.font = '900 34px Poppins, sans-serif';
          ctx.fillText('Necesitas ' + faltan + ' ruta' + (faltan !== 1 ? 's' : '') + ' más', blockX + 26, blockY + 120);

          const totalPara = entry.totalParaSiguiente || 1;
          const progreso = entry.progreso || 0;
          const pct = totalPara > 0 ? Math.min(100, (progreso / totalPara) * 100) : 0;

          // progress bar
          const barX = blockX + 26;
          const barY = blockY + 180;
          const barW = blockW - 52;
          const barH = 22;
          ctx.fillStyle = 'rgba(255,255,255,0.12)';
          drawRoundRect(ctx, barX, barY, barW, barH, 999);
          ctx.fill();

          ctx.fillStyle = r.color || 'rgba(118,200,147,1)';
          drawRoundRect(ctx, barX, barY, (barW * (pct / 100)), barH, 999);
          ctx.fill();

          ctx.fillStyle = 'rgba(255,255,255,0.6)';
          ctx.font = '900 28px Poppins, sans-serif';
          ctx.fillText(progreso + '/' + totalPara, barX, barY + 50);
          ctx.fillText(Math.round(pct) + '%', barX + barW - 110, barY + 50);
        }

        // Guardar y descargar
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        if (!blob) {
          alert('No se pudo generar la imagen.');
          return;
        }

        const safeNombre = safeText(entry.nombre || 'ranking').replace(/[^a-zA-Z0-9_-]+/g, '-').slice(0, 40);
        const file = new File([blob], 'ranking-historia-' + safeNombre + '.png', { type: 'image/png' });

        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = file.name;
        document.body.appendChild(a);
        a.click();
        a.remove();

        if (navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
          try {
            await navigator.share({
              files: [file],
              title: 'Ranking SomosAventura2',
              text: 'Mira mi progreso en el ranking de SomosAventura2.'
            });
          } catch (e) {
            // Falla share => ya hay descarga.
          }
        }
      }

      if (btnCompartir) {
        btnCompartir.addEventListener('click', async () => {
          btnCompartir.disabled = true;
          const old = btnCompartir.textContent;
          btnCompartir.textContent = 'Generando...';
          await exportStoryAndShare();
          btnCompartir.disabled = false;
          btnCompartir.textContent = old;
        });
      }

      function abrirModalRankingLanding(nombre) {
        var ranking = window._rankingLanding;
        var avatarMap = window._avatarMapLanding;
        if (!ranking || !nombre) return;

        var entry = ranking.find(function (e) { return (e.nombre || '') === nombre; });
        if (!entry) return;

        var position = ranking.indexOf(entry) + 1;
        var r = entry.rango;
        var badgeSrc = 'badges/' + (r.nombre || '').toLowerCase() + '.png';
        var avatarUrl = avatarMap && avatarMap.get(nombre);
        var rutasText = entry.rutasAsistidas === 1 ? '1 RUTA' : entry.rutasAsistidas + ' RUTAS';
        var statsPillText = (r.nombre || '').toUpperCase() + ' | ' + rutasText;

        var modal = document.getElementById('rankingModal');
        var contentEl = document.getElementById('rankingModalContent');
        var avatarEl = document.getElementById('rankingModalAvatar');
        var badgeWrap = document.getElementById('rankingModalBadge');
        var nombreEl = document.getElementById('rankingModalNombre');
        var rankPosEl = document.getElementById('rankingModalRankPos');
        var statsPillEl = document.getElementById('rankingModalStatsPill');
        var rutasEl = document.getElementById('rankingModalRutas');
        var proximoEl = document.getElementById('rankingModalProximo');

        if (!modal || !contentEl || !badgeWrap || !nombreEl || !statsPillEl) return;

        // Fondo aleatorio para el modal
        setRandomModalBackground(contentEl);

        // Guardar datos para el export
        window._rankingModalEntry = entry;
        window._rankingModalPosition = position;

        contentEl.classList.remove('ranking-modal-content--gold', 'ranking-modal-content--silver', 'ranking-modal-content--bronze', 'ranking-modal-content--green');
        if (position === 1) contentEl.classList.add('ranking-modal-content--gold');
        else if (position === 2) contentEl.classList.add('ranking-modal-content--silver');
        else if (position === 3) contentEl.classList.add('ranking-modal-content--bronze');
        else contentEl.classList.add('ranking-modal-content--green');

        if (avatarEl) {
          avatarEl.innerHTML = '';
          if (avatarUrl) {
            avatarEl.style.display = '';
            var imgAvatar = document.createElement('img');
            imgAvatar.src = String(avatarUrl);
            imgAvatar.alt = '';
            imgAvatar.onerror = function () {
              avatarEl.innerHTML = '<span class="avatar-fallback" aria-hidden="true">👤</span>';
            };
            avatarEl.appendChild(imgAvatar);
          } else {
            avatarEl.style.display = 'none';
          }
        }

        var badgeGlowColor = r.color || 'rgba(118,200,147,0.5)';
        var badgeGlowStyle = 'box-shadow: 0 0 20px ' + badgeGlowColor + '44, 0 0 40px ' + badgeGlowColor + '22;';
        badgeWrap.innerHTML = '';
        var badgeContainer = document.createElement('div');
        badgeContainer.className = 'badge-container';
        badgeContainer.setAttribute('style', badgeGlowStyle);

        var imgBadge = document.createElement('img');
        imgBadge.src = badgeSrc;
        imgBadge.alt = r.nombre || '';

        var badgeFallback = document.createElement('span');
        badgeFallback.className = 'rank-badge-fallback';
        badgeFallback.style.display = 'none';
        badgeFallback.style.color = r.color || '#b8c5be';
        badgeFallback.textContent = r.nombre || '';

        imgBadge.onerror = function () {
          imgBadge.style.display = 'none';
          badgeFallback.style.display = 'block';
        };

        badgeContainer.appendChild(imgBadge);
        badgeContainer.appendChild(badgeFallback);
        badgeWrap.appendChild(badgeContainer);

        if (rankPosEl) {
          rankPosEl.textContent = '#' + position;
          rankPosEl.style.color = r.color || '#b8c5be';
        }

        nombreEl.textContent = entry.nombre || '';
        statsPillEl.textContent = statsPillText;
        statsPillEl.style.display = 'block';
        statsPillEl.style.color = r.color || '#b8c5be';
        statsPillEl.style.borderColor = r.color || 'rgba(118,200,147,0.5)';

        var rutasList = entry.rutasAsistidasList || [];
        if (rutasEl) {
          if (rutasList.length === 0) {
            rutasEl.innerHTML = '';
            rutasEl.style.display = 'none';
          } else {
            rutasEl.style.display = 'block';
            var listHtml = '<div class="ranking-modal-rutas-title">🏔️ Rutas asistidas</div><div class="ranking-modal-rutas-list">';
            var sliceRutas = rutasList.slice(0, 8);
            for (var i = 0; i < sliceRutas.length; i++) {
              var ru = sliceRutas[i];
              var veces = ru.vecesAsistio || 1;
              var badgeRepetida = veces > 1 ? ' <span class="ruta-veces">x' + veces + '</span>' : '';
              listHtml += '<span class="ranking-modal-ruta-tag">' + escapeHtmlLanding(ru.nombre) + badgeRepetida + '</span>';
            }
            if (rutasList.length > 8) listHtml += '<span class="ranking-modal-ruta-tag" style="border-style:dashed;color:var(--text-secondary)">+' + (rutasList.length - 8) + ' más</span>';
            listHtml += '</div>';
            rutasEl.innerHTML = listHtml;
          }
        }

        var sig = entry.siguienteRango;
        if (proximoEl) {
          if (!sig) {
            proximoEl.innerHTML = '';
            proximoEl.style.display = 'none';
          } else {
            proximoEl.style.display = 'block';
            var faltan = (sig.minRutas || 0) - (entry.rutasAsistidas || 0);
            if (faltan < 0) faltan = 0;
            var totalPara = entry.totalParaSiguiente || 1;
            var progreso = entry.progreso || 0;
            var pct = totalPara > 0 ? Math.min(100, (progreso / totalPara) * 100) : 0;
            proximoEl.innerHTML = '<div class="ranking-modal-proximo-title" style="color:' + (sig.color || '') + '">' + (sig.emoji || '') + ' Próximo rango: ' + escapeHtmlLanding(sig.nombre) + '</div>' +
              '<div class="ranking-modal-proximo-text">Necesitas ' + faltan + ' ruta' + (faltan !== 1 ? 's' : '') + ' más</div>' +
              '<div class="ranking-modal-proximo-bar"><div class="ranking-modal-proximo-fill" style="width:' + pct + '%;background:' + (sig.color || '') + '"></div></div>' +
              '<div class="ranking-modal-proximo-meta"><span>' + progreso + '/' + totalPara + '</span><span>' + Math.round(pct) + '%</span></div>';
          }
        }

        modal.classList.add('active');
        document.body.classList.add('lightbox-open');
      }

      function cerrarModalRankingLanding() {
        var modal = document.getElementById('rankingModal');
        if (modal) modal.classList.remove('active');
        document.body.classList.remove('lightbox-open');
      }

      // Hook modal (cierre por botón / overlay / Escape)
      (function () {
        var btn = document.getElementById('rankingModalClose');
        var modal = document.getElementById('rankingModal');
        if (btn) btn.addEventListener('click', cerrarModalRankingLanding);
        if (modal) modal.addEventListener('click', function (e) { if (e.target === modal) cerrarModalRankingLanding(); });
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape') cerrarModalRankingLanding(); });

        if (rankingContainer) rankingContainer.addEventListener('click', function (e) {
          var card = e.target.closest('.ranking-card[data-nombre]');
          if (card) {
            var nombre = card.getAttribute('data-nombre');
            if (nombre != null) abrirModalRankingLanding(nombre);
          }
        });
      })();

      try {
        loading.style.display = '';

        const [{ data: participantes, error: errPart }, { data: rutas }, { data: avatares }] = await Promise.all([
          db.from('participantes').select('nombre, ruta_id, asiste'),
          db.from('rutas').select('id, nombre'),
          db.from('avatares_ranking').select('nombre, avatar_url')
        ]);

        if (errPart) throw errPart;

        let avatarMap = new Map();
        if (avatares && avatares.length) {
          avatares.forEach(function (a) { avatarMap.set((a.nombre || '').trim(), a.avatar_url); });
        }

        const rutasMap = new Map((rutas || []).map(function (r) { return [r.id, r.nombre || ('Ruta ' + r.id)]; }));
        const personasMap = new Map();

        (participantes || []).forEach(function (p) {
          const nombre = (p.nombre || '').trim();
          if (!nombre) return;

          if (!personasMap.has(nombre)) {
            personasMap.set(nombre, { nombre: nombre, rutasSet: new Set(), rutasDetalleMap: new Map() });
          }
          const persona = personasMap.get(nombre);

          if (p.asiste === true && p.ruta_id) {
            persona.rutasSet.add(p.ruta_id);
            const nomRuta = rutasMap.get(p.ruta_id) || ('Ruta ' + p.ruta_id);
            persona.rutasDetalleMap.set(nomRuta, (persona.rutasDetalleMap.get(nomRuta) || 0) + 1);
          }
        });

        const ordenRangos = { 'Diamante': 6, 'Platino': 5, 'Oro': 4, 'Plata': 3, 'Bronce': 2, 'Novato': 1 };

        const ranking = Array.from(personasMap.values())
          .map(function (persona) {
            const rutasAsistidas = persona.rutasSet.size;
            const rango = calcularRangoAventurado(rutasAsistidas);
            const siguienteRango = getSiguienteRangoLanding(rango);
            const rutasAsistidasList = Array.from(persona.rutasDetalleMap.entries()).map(function (e) { return { nombre: e[0], vecesAsistio: e[1] }; });
            return {
              nombre: persona.nombre,
              rutasAsistidas: rutasAsistidas,
              rango: rango,
              rutasAsistidasList: rutasAsistidasList,
              siguienteRango: siguienteRango,
              progreso: rango && siguienteRango ? rutasAsistidas - rango.minRutas : 0,
              totalParaSiguiente: rango && siguienteRango ? siguienteRango.minRutas - rango.minRutas : 0
            };
          })
          .filter(function (p) { return p.rutasAsistidas >= 2; })
          .sort(function (a, b) {
            const pesoA = ordenRangos[a.rango.nombre] || 0;
            const pesoB = ordenRangos[b.rango.nombre] || 0;
            if (pesoB !== pesoA) return pesoB - pesoA;
            if (b.rutasAsistidas !== a.rutasAsistidas) return b.rutasAsistidas - a.rutasAsistidas;
            return (a.nombre || '').localeCompare(b.nombre || '', 'es');
          });

        loading.style.display = 'none';
        list.style.display = 'flex';

        if (ranking.length === 0) {
          restEl.innerHTML = '<div style="padding: 18px 0; color: var(--text-secondary); text-align:center;">No hay ranking todavía.</div>';
          btnLoadMore.style.display = 'none';
          return;
        }

        window._rankingLanding = ranking;
        window._avatarMapLanding = avatarMap;

        const top3 = ranking.slice(0, 3);
        const restAll = ranking.slice(3);

        // Igual que la landing: reordenamos los 3 primeros para que el layout apilado
        // muestre #1 arriba (y #2 abajo) a pesar de cómo se aplica el CSS por nth-child.
        const displayIndices = top3.length === 1 ? [0] : top3.length === 2 ? [1, 0] : [1, 0, 2];
        const displayPositions = top3.length === 1 ? [1] : top3.length === 2 ? [2, 1] : [2, 1, 3];
        podioEl.innerHTML = displayIndices
          .map(function (idx, i) { return renderCard(top3[idx], displayPositions[i], avatarMap); })
          .join('');

        const CHUNK_SIZE = 18;
        let visible = 0;
        restEl.innerHTML = '';

        function renderNextRestChunk() {
          if (visible >= restAll.length) {
            btnLoadMore.style.display = 'none';
            return;
          }
          const slice = restAll.slice(visible, visible + CHUNK_SIZE);
          const html = slice.map((entry, i) => renderCard(entry, 4 + visible + i, avatarMap)).join('');
          restEl.insertAdjacentHTML('beforeend', html);
          visible += slice.length;
          if (visible >= restAll.length) btnLoadMore.style.display = 'none';
        }

        if (restAll.length > 0) {
          btnLoadMore.style.display = 'block';
          btnLoadMore.onclick = renderNextRestChunk;
          renderNextRestChunk();
        } else {
          btnLoadMore.style.display = 'none';
        }

        // Activar animaciones de entrada cuando el bloque ranking entra en viewport.
        const sectionEl = document.getElementById('rankingSection');
        if (sectionEl) {
          const observer = new IntersectionObserver(function (entries, obs) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                sectionEl.classList.add('in-view');
                obs.disconnect();
              }
            });
          }, { threshold: 0.12 });
          observer.observe(sectionEl);
        } else {
          // Fallback: si no existe el contenedor, mostrar sin animación oculta.
          document.querySelectorAll('.ranking-section').forEach(el => el.classList.add('in-view'));
        }
      } catch (err) {
        console.error(err);
        loading.style.display = '';
        loading.textContent = 'No pudimos cargar el ranking.';
      }
    });
  </script>
</body>
